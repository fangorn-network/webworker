name = "fangorn-access-worker"
main = "src/index.ts"
compatibility_date = "2025-07-18"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "my-first-bucket"

[vars]
SETTLEMENT_REGISTRY_ADDRESS = "0x1d21545f536a2f026348477960ca59f9f1d7fabd"
ARBITRUM_SEPOLIA_RPC = "https://sepolia-rollup.arbitrum.io/rpc"
TIMESTAMP_WINDOW = "60"

[observability]
enabled = true
head_sampling_rate = 1